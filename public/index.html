<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART BOT PRO - Cyberpunk Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        mono: ['"JetBrains Mono"', 'monospace'],
                        sans: ['"Rajdhani"', 'sans-serif'],
                    },
                    colors: {
                        cyber: {
                            black: '#030014',
                            dark: '#0a0a1f',
                            panel: '#13132b',
                            primary: '#00f0ff',
                            secondary: '#7000ff',
                            success: '#00ff9d',
                            danger: '#ff0055',
                            warning: '#ffbe0b'
                        }
                    },
                    animation: {
                        'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'scanline': 'scanline 8s linear infinite',
                        'glow': 'glow 2s ease-in-out infinite alternate',
                    },
                    keyframes: {
                        scanline: {
                            '0%': { transform: 'translateY(-100%)' },
                            '100%': { transform: 'translateY(100%)' }
                        },
                        glow: {
                            '0%': { boxShadow: '0 0 5px rgba(0,240,255,0.2)' },
                            '100%': { boxShadow: '0 0 20px rgba(0,240,255,0.6), 0 0 10px rgba(0,240,255,0.4)' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            background-color: #030014; 
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(112, 0, 255, 0.15) 0%, transparent 50%),
                linear-gradient(0deg, rgba(0,0,0,0.2) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.2) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            color: #e2e8f0;
        }
        
        /* Glassmorphism Cyberpunk Style */
        .cyber-glass {
            background: rgba(19, 19, 43, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 240, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        
        .cyber-card {
            background: linear-gradient(145deg, rgba(19, 19, 43, 0.9), rgba(10, 10, 31, 0.95));
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .cyber-card:hover {
            border-color: rgba(0, 240, 255, 0.4);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.15);
            transform: translateY(-2px);
        }
        .cyber-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0, 240, 255, 0.5), transparent);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0a0a1f; }
        ::-webkit-scrollbar-thumb { background: #1e1e3f; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #00f0ff; }

        .text-glow { text-shadow: 0 0 10px rgba(0, 240, 255, 0.5); }
        .text-glow-red { text-shadow: 0 0 10px rgba(255, 0, 85, 0.5); }
        .text-glow-green { text-shadow: 0 0 10px rgba(0, 255, 157, 0.5); }

        .scan-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 240, 255, 0.02) 51%, transparent 51%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 50;
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden font-sans">
    
    <div class="scan-overlay"></div>

    <!-- Header -->
    <header class="cyber-glass h-16 px-6 flex justify-between items-center z-40 border-b border-cyber-primary/20">
        <div class="flex items-center gap-4">
            <div class="relative">
                <div class="w-3 h-3 bg-cyber-success rounded-full animate-pulse shadow-[0_0_10px_#00ff9d]" id="connectionStatus"></div>
                <div class="absolute inset-0 bg-cyber-success rounded-full animate-ping opacity-20"></div>
            </div>
            <div>
                <h1 class="text-2xl font-bold tracking-tight text-white flex items-center gap-1">
                    SMART<span class="text-cyber-primary text-glow">BOT</span>
                    <span class="text-[10px] px-2 py-0.5 bg-cyber-secondary/20 border border-cyber-secondary/50 rounded text-cyber-secondary ml-2 font-mono">v4.0.0</span>
                </h1>
                <div class="flex items-center gap-2 text-[10px] font-mono text-slate-400">
                    <span id="lastSync" class="text-cyber-primary">INITIALIZING SYSTEM...</span>
                </div>
            </div>
        </div>
        
        <div class="flex items-center gap-8">
            <div class="text-right">
                <div class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Equity</div>
                <div class="text-2xl font-mono font-bold text-white tracking-tight" id="equity">$0.00</div>
            </div>
            <div class="h-8 w-px bg-slate-800"></div>
            <div class="text-right">
                <div class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Balance</div>
                <div class="text-xl font-mono text-cyber-primary/80" id="balance">$0.00</div>
            </div>
            <div class="ml-4">
                <div id="botMode" class="px-4 py-2 bg-cyber-primary/10 border border-cyber-primary/30 text-cyber-primary font-bold rounded-sm shadow-[0_0_15px_rgba(0,240,255,0.15)] tracking-wider">AUTO</div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex overflow-hidden relative z-10">
        
        <!-- Left: Market Grid -->
        <div class="flex-1 flex flex-col min-w-0">
            <!-- Grid Container -->
            <div class="flex-1 p-6 overflow-y-auto custom-scrollbar">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4" id="marketGrid">
                    <!-- Loading State -->
                    <div class="col-span-full h-64 flex flex-col items-center justify-center text-cyber-primary/50">
                        <div class="w-16 h-16 border-4 border-cyber-primary/30 border-t-cyber-primary rounded-full animate-spin mb-4"></div>
                        <span class="font-mono text-sm tracking-widest animate-pulse">ESTABLISHING UPLINK...</span>
                    </div>
                </div>
            </div>

            <!-- Bottom: Logs Terminal -->
            <div class="h-48 cyber-glass border-t border-cyber-primary/20 flex flex-col">
                <div class="px-4 py-2 bg-cyber-black/50 border-b border-white/5 flex justify-between items-center">
                    <div class="flex items-center gap-2 text-cyber-primary text-xs font-bold tracking-widest uppercase">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                        System Event Log
                    </div>
                    <span class="text-[10px] text-slate-500 font-mono">LIVE FEED</span>
                </div>
                <div id="miniLogs" class="flex-1 overflow-y-auto p-3 font-mono text-[11px] space-y-1 custom-scrollbar bg-black/20">
                    <div class="text-slate-600 pl-2 border-l-2 border-slate-800">System initialized. Waiting for ticks...</div>
                </div>
            </div>
        </div>

        <!-- Right: Sidebar -->
        <div class="w-80 cyber-glass border-l border-cyber-primary/20 flex flex-col z-20">
            <!-- Control Panel -->
            <div class="p-4 border-b border-white/5">
                <h3 class="text-slate-500 text-[10px] font-bold uppercase tracking-widest mb-3">Strategy Override</h3>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="switchMode('SNIPER')" class="py-2 bg-slate-800/50 hover:bg-slate-700/50 border border-slate-700 hover:border-slate-500 rounded-sm text-xs font-bold text-slate-300 transition-all">
                        SNIPER
                    </button>
                    <button onclick="switchMode('PREDATOR')" class="py-2 bg-cyber-danger/10 hover:bg-cyber-danger/20 border border-cyber-danger/30 hover:border-cyber-danger/60 rounded-sm text-xs font-bold text-cyber-danger transition-all shadow-[0_0_10px_rgba(255,0,85,0.1)]">
                        PREDATOR
                    </button>
                </div>
            </div>

            <!-- Positions Panel -->
            <div class="flex-1 flex flex-col overflow-hidden bg-cyber-black/20">
                <div class="px-4 py-3 border-b border-white/5 flex justify-between items-center bg-cyber-primary/5">
                    <span class="text-[10px] uppercase tracking-wider text-cyber-primary font-bold">Active Positions</span>
                    <span class="text-[10px] bg-cyber-primary/20 text-cyber-primary px-2 py-0.5 rounded font-mono border border-cyber-primary/20" id="posCount">0</span>
                </div>
                <div class="flex-1 overflow-y-auto p-3 space-y-2 custom-scrollbar" id="positionsList">
                    <!-- Positions will be injected here -->
                </div>
            </div>
        </div>
    </main>

    <script>
        const socket = io();
        const pairsData = {};
        const domCache = {}; 
        
        const elBalance = document.getElementById('balance');
        const elEquity = document.getElementById('equity');
        const elMode = document.getElementById('botMode');
        const elGrid = document.getElementById('marketGrid');
        const elPositions = document.getElementById('positionsList');
        const elConnection = document.getElementById('connectionStatus');
        const elLastSync = document.getElementById('lastSync');
        const elPosCount = document.getElementById('posCount');

        socket.on('connect', () => {
            elConnection.className = 'w-3 h-3 bg-cyber-success rounded-full animate-pulse shadow-[0_0_10px_#00ff9d]';
        });

        socket.on('disconnect', () => {
            elConnection.className = 'w-3 h-3 bg-cyber-danger rounded-full animate-pulse shadow-[0_0_10px_#ff0055]';
        });

        socket.on('init', (data) => {
            updateConfig(data.config);
            updateAccount(data.account);
            if(data.lastSync) updateSyncStatus(data.lastSync);
            
            if (data.market) {
                Object.keys(data.market).forEach(pair => {
                    const item = data.market[pair];
                    updateCard(item.state);
                    updatePrice({ pair: pair, price: item.state.price, time: item.time });
                });
            }

            if (data.config && data.config.pairs) {
                data.config.pairs.forEach(pair => {
                    if (!pairsData[pair]) {
                        updateCard({
                            pair: pair,
                            price: 0,
                            rsi: 0,
                            signal: 'WAIT',
                            reason: 'System Standby',
                            account: null
                        });
                    }
                });
            }
        });

        socket.on('update', (data) => {
            const initMsg = elGrid.querySelector('.col-span-full');
            if(initMsg) initMsg.remove();

            if (data.pair) {
                updateCard(data);
                if(data.signal && data.signal !== 'WAIT' && data.signal !== 'PENDING' && data.signal !== 'COOLDOWN') {
                     const pairName = data.pair.includes(':') ? data.pair.split(':')[1] : data.pair;
                     logMini(`SIGNAL: ${pairName} ${data.signal} @ ${data.price.toFixed(5)}`, data.signal === 'BUY' ? 'text-cyber-success' : 'text-cyber-danger');
                }
            }
            
            if (data.account) updateAccount(data.account);
            if (data.lastSync) updateSyncStatus(data.lastSync);
        });

        socket.on('account_update', (data) => {
            updateAccount(data.account);
            if(data.lastSync) updateSyncStatus(data.lastSync);
        });

        socket.on('balance_update', (data) => {
            if(data.balance !== undefined) elBalance.innerText = `$${parseFloat(data.balance).toFixed(2)}`;
            if(data.equity !== undefined) elEquity.innerText = `$${parseFloat(data.equity).toFixed(2)}`;
        });

        socket.on('price', (data) => updatePrice(data));

        socket.on('log', (msg) => {
            if(msg.includes('OPEN') || msg.includes('CLOSE') || msg.includes('BLOCKED')) {
                logMini(msg, 'text-cyber-warning');
            }
        });

        function logMini(msg, colorClass = 'text-slate-400') {
            const div = document.createElement('div');
            const time = new Date().toLocaleTimeString();
            div.className = `border-b border-white/5 pb-1 mb-1 ${colorClass}`;
            div.innerHTML = `<span class="text-slate-600 mr-2 font-bold">[${time}]</span>${msg}`;
            const elMiniLogs = document.getElementById('miniLogs');
            if(elMiniLogs) {
                elMiniLogs.prepend(div);
                if (elMiniLogs.children.length > 50) elMiniLogs.lastChild.remove();
            }
        }

        socket.on('settingsUpdated', (config) => {
            if(config.mode) updateConfig({mode: config.mode});
            if(config.balance) updateAccount({balance: config.balance});
        });

        function switchMode(mode) {
            socket.emit('switchMode', mode);
        }

        function updateConfig(config) {
            elMode.innerText = config.mode;
            if (config.mode === 'PREDATOR') {
                elMode.className = 'px-4 py-2 bg-cyber-danger/10 border border-cyber-danger/30 text-cyber-danger font-bold rounded-sm shadow-[0_0_15px_rgba(255,0,85,0.15)] tracking-wider';
            } else {
                elMode.className = 'px-4 py-2 bg-cyber-primary/10 border border-cyber-primary/30 text-cyber-primary font-bold rounded-sm shadow-[0_0_15px_rgba(0,240,255,0.15)] tracking-wider';
            }
        }

        function updateAccount(acc) {
            if(!acc) return;
            elBalance.innerText = `$${parseFloat(acc.balance).toFixed(2)}`;
            elEquity.innerText = `$${parseFloat(acc.equity).toFixed(2)}`;
            elPosCount.innerText = acc.positions.length;

            elPositions.innerHTML = '';
            if (acc.positions.length === 0) {
                elPositions.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-32 text-slate-600 space-y-2 opacity-50">
                        <span class="text-xs font-mono">NO ACTIVE CONTRACTS</span>
                    </div>`;
            } else {
                acc.positions.forEach(p => {
                    const div = document.createElement('div');
                    const profit = (typeof p.profit === 'number') ? p.profit : 0;
                    const isBuy = p.type === 'BUY';
                    const isProfit = profit >= 0;
                    
                    div.className = `p-3 rounded-sm border relative overflow-hidden group transition-all hover:bg-white/5 ${isBuy ? 'bg-cyber-success/5 border-cyber-success/20' : 'bg-cyber-danger/5 border-cyber-danger/20'}`;
                    
                    div.innerHTML = `
                        <div class="absolute top-0 left-0 w-1 h-full ${isBuy ? 'bg-cyber-success' : 'bg-cyber-danger'}"></div>
                        <div class="flex justify-between items-start mb-2 pl-2">
                            <div class="flex items-center gap-2">
                                <span class="text-[9px] font-bold px-1.5 py-0.5 rounded-sm ${isBuy ? 'bg-cyber-success/20 text-cyber-success' : 'bg-cyber-danger/20 text-cyber-danger'}">${p.type}</span>
                                <span class="font-bold text-white text-sm tracking-tight">${p.pair.includes(':') ? p.pair.split(':')[1] : p.pair}</span>
                            </div>
                            <div class="text-right">
                                <div class="font-mono font-bold text-sm ${isProfit ? 'text-cyber-success text-glow-green' : 'text-cyber-danger text-glow-red'} transition-all duration-300" id="profit-${p.ticket}">
                                    ${isProfit ? '+' : ''}${profit.toFixed(2)}
                                </div>
                                <div class="text-[8px] text-cyber-primary animate-pulse tracking-wider">● LIVE</div>
                            </div>
                        </div>
                        <div class="flex justify-between items-end pl-2">
                            <div class="text-[10px] text-slate-500 font-mono">
                                <div><span class="text-slate-400">LOT:</span> ${p.lot || '?'}</div>
                                <div><span class="text-slate-400">OP :</span> ${p.openPrice || '?'}</div>
                            </div>
                            <button onclick="manualClose('${p.ticket}')" class="opacity-0 group-hover:opacity-100 transition-opacity text-[9px] bg-slate-800 hover:bg-white text-slate-400 hover:text-black px-3 py-1 rounded-sm border border-slate-600 font-bold">
                                CLOSE
                            </button>
                        </div>
                    `;
                    elPositions.appendChild(div);
                });
            }
        }

        function manualClose(ticket) {
            if(confirm('CONFIRM MANUAL CLOSE?')) {
                socket.emit('manualClose', ticket);
            }
        }

        function updateCard(data) {
            const pair = data.pair;
            const safeId = pair.replace(':', '-');
            const simplePair = pair.includes(':') ? pair.split(':')[1] : pair;
            
            if (!pairsData[pair]) {
                const card = document.createElement('div');
                card.id = `card-${safeId}`;
                card.className = 'cyber-card p-4 rounded-sm';
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <div class="flex items-center gap-2">
                                <h2 class="text-xl font-bold text-white tracking-tight font-sans">${simplePair}</h2>
                                <span class="text-[9px] px-1 rounded bg-white/10 text-slate-400 border border-white/10 font-mono">M15</span>
                            </div>
                            <div class="text-[10px] text-slate-500 mt-1 font-mono" id="time-${safeId}">--:--:--</div>
                        </div>
                        <div class="text-right">
                            <div class="text-2xl font-mono font-bold text-white tracking-tighter" id="price-${safeId}">
                                ${data.price > 0 ? data.price.toFixed(5) : '<span class="text-slate-700">0.00000</span>'}
                            </div>
                        </div>
                    </div>
                    
                    <div class="space-y-3 mb-4">
                        <!-- Signal Badge -->
                        <div class="flex items-center justify-between p-2 rounded-sm bg-black/30 border border-white/5">
                            <span class="text-[9px] uppercase tracking-widest text-slate-500 font-bold">Strategy</span>
                            <div class="font-bold text-xs flex items-center gap-2" id="signal-badge-${safeId}">
                                <span class="w-1.5 h-1.5 rounded-full bg-slate-600"></span>
                                <span id="signal-${safeId}" class="text-slate-400">SCANNING</span>
                            </div>
                        </div>

                        <!-- Indicators -->
                        <div class="grid grid-cols-2 gap-2">
                            <div class="bg-black/20 p-2 rounded-sm border border-white/5">
                                <div class="flex justify-between text-[9px] mb-1">
                                    <span class="text-slate-500 font-bold">RSI</span>
                                    <span class="font-mono text-white" id="rsi-val-${safeId}">--</span>
                                </div>
                                <div class="h-1 bg-white/10 rounded-full overflow-hidden">
                                    <div class="h-full bg-cyber-secondary w-0 transition-all duration-500" id="rsi-bar-${safeId}"></div>
                                </div>
                            </div>
                            <div class="bg-black/20 p-2 rounded-sm border border-white/5">
                                <div class="flex justify-between text-[9px] mb-1">
                                    <span class="text-slate-500 font-bold">TP</span>
                                    <span class="font-mono text-cyber-primary" id="tp-${safeId}">-</span>
                                </div>
                                <div class="text-[9px] text-slate-500 truncate" id="vsl-${safeId}">VSL: -</div>
                            </div>
                        </div>
                    </div>

                    <div class="pt-3 border-t border-white/5">
                        <div class="text-[10px] text-slate-400 truncate font-mono opacity-70" id="reason-${safeId}">
                            Initializing neural link...
                        </div>
                    </div>
                `;
                
                elGrid.appendChild(card);
                pairsData[pair] = true;

                domCache[pair] = {
                    card: card,
                    price: document.getElementById(`price-${safeId}`),
                    time: document.getElementById(`time-${safeId}`),
                    rsiVal: document.getElementById(`rsi-val-${safeId}`),
                    rsiBar: document.getElementById(`rsi-bar-${safeId}`),
                    signal: document.getElementById(`signal-${safeId}`),
                    signalBadge: document.getElementById(`signal-badge-${safeId}`),
                    reason: document.getElementById(`reason-${safeId}`),
                    vsl: document.getElementById(`vsl-${safeId}`),
                    tp: document.getElementById(`tp-${safeId}`)
                };
            }

            const els = domCache[pair];
            if(!els) return;

            const rsi = data.rsi;
            els.rsiVal.innerText = rsi.toFixed(1);
            els.rsiBar.style.width = `${Math.min(Math.max(rsi, 0), 100)}%`;
            
            let rsiColor = 'bg-slate-500';
            if (rsi > 70) rsiColor = 'bg-cyber-danger shadow-[0_0_8px_#ff0055]';
            else if (rsi < 30) rsiColor = 'bg-cyber-success shadow-[0_0_8px_#00ff9d]';
            else if (rsi > 55) rsiColor = 'bg-cyber-danger/50';
            else if (rsi < 45) rsiColor = 'bg-cyber-success/50';
            
            els.rsiBar.className = `h-full transition-all duration-500 ${rsiColor}`;

            if (data.signal === 'BUY') {
                els.signal.innerText = 'LONG ENTRY';
                els.signal.className = 'text-cyber-success text-glow-green tracking-wider';
                els.signalBadge.innerHTML = `<span class="w-2 h-2 rounded-full bg-cyber-success animate-pulse shadow-[0_0_5px_#00ff9d]"></span> <span class="text-cyber-success tracking-wider">BUY</span>`;
                els.card.style.borderColor = 'rgba(0, 255, 157, 0.4)';
                els.card.style.boxShadow = '0 0 20px rgba(0, 255, 157, 0.1)';
            } else if (data.signal === 'SELL') {
                els.signal.innerText = 'SHORT ENTRY';
                els.signal.className = 'text-cyber-danger text-glow-red tracking-wider';
                els.signalBadge.innerHTML = `<span class="w-2 h-2 rounded-full bg-cyber-danger animate-pulse shadow-[0_0_5px_#ff0055]"></span> <span class="text-cyber-danger tracking-wider">SELL</span>`;
                els.card.style.borderColor = 'rgba(255, 0, 85, 0.4)';
                els.card.style.boxShadow = '0 0 20px rgba(255, 0, 85, 0.1)';
            } else {
                els.signal.innerText = 'WAIT';
                els.signal.className = 'text-slate-500';
                els.signalBadge.innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-slate-600"></span> <span class="text-slate-500">WAIT</span>`;
                els.card.style.borderColor = '';
                els.card.style.boxShadow = '';
            }

            els.reason.innerText = data.reason || 'Scanning market structure...';
            els.reason.className = (data.reason && data.reason.includes('Wait')) ? 'text-[10px] text-slate-500 truncate font-mono' : 'text-[10px] text-cyber-primary/70 truncate font-mono';

            if (els.vsl) els.vsl.innerText = (typeof data.virtualSL === 'number') ? `VSL: ${data.virtualSL.toFixed(5)}` : 'VSL: -';
            if (els.tp) els.tp.innerText = (typeof data.tp === 'number' && data.tp > 0) ? `${data.tp.toFixed(5)}` : '-';
        }

        function updatePrice(data) {
            const pair = data.pair;
            const els = domCache[pair];
            if(!els) return;

            const oldPrice = parseFloat(els.price.innerText) || 0;
            const newPrice = data.price;
            
            els.price.innerText = newPrice.toFixed(5);
            
            if (newPrice > oldPrice) {
                els.price.className = 'text-2xl font-mono font-bold text-cyber-success text-glow-green tracking-tighter transition-colors duration-300';
                setTimeout(() => els.price.className = 'text-2xl font-mono font-bold text-white tracking-tighter transition-colors duration-1000', 300);
            } else if (newPrice < oldPrice) {
                els.price.className = 'text-2xl font-mono font-bold text-cyber-danger text-glow-red tracking-tighter transition-colors duration-300';
                setTimeout(() => els.price.className = 'text-2xl font-mono font-bold text-white tracking-tighter transition-colors duration-1000', 300);
            }
            
            els.time.innerText = data.time;
        }

        function updateSyncStatus(timestamp) {
            lastSyncTime = timestamp;
            const diff = Math.floor((Date.now() - timestamp) / 1000);
            
            if (diff < 5) {
                elLastSync.innerText = `LINK ESTABLISHED (${diff}s)`;
                elLastSync.className = 'text-[10px] font-mono font-bold text-cyber-success animate-pulse';
            } else if (diff < 15) {
                elLastSync.innerText = `LINK UNSTABLE (${diff}s)`;
                elLastSync.className = 'text-[10px] font-mono font-bold text-cyber-warning';
            } else {
                elLastSync.innerText = `CONNECTION LOST (${diff}s)`;
                elLastSync.className = 'text-[10px] font-mono font-bold text-cyber-danger animate-bounce';
            }
        }

        setInterval(() => {
            if(lastSyncTime > 0) updateSyncStatus(lastSyncTime);
        }, 1000);
    </script>
</body>
</html>
